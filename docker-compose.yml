# Full-stack APEX F1 (production-like local run).
#
# 1. Build the web bundle (API URL is baked in at build time):
#    EXPO_PUBLIC_API_URL=http://127.0.0.1:8000 npm run build:web
#    (omit env to use .env / app default — Cloud Run URL in eas.json profiles.)
#
# 2. Start API + static web:
#    docker compose up --build
#
# Web UI: http://localhost:8080  ·  API: http://localhost:8000

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      PORT: "8080"
    # Optional: Redis for Ergast/OpenF1 cache (same as production)
    # env_file: .env

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./mobile/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
